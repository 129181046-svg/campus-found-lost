<!DOCTYPE html>
<html>
<body style="font-family:Arial,sans-serif;max-width:600px;margin:auto;padding:20px;">
  <div style="background:#1B2A4A;padding:20px;border-radius:8px 8px 0 0;">
    <h2 style="color:white;margin:0;">📬 New Claim on Your Item</h2>
  </div>
  <div style="border:1px solid #ddd;padding:24px;border-radius:0 0 8px 8px;">
    <p>Hi {{ finder_name }},</p>
    <p><strong>{{ claimer_name }}</strong> has submitted a claim on your found item: <strong>{{ item_name }}</strong>.</p>
    <p>Please log in to review their claim details and decide whether to approve or reject.</p>
    <p style="text-align:center;">
      <a href="{{ incoming_url }}"
         style="background:#0F6E56;color:white;padding:12px 24px;border-radius:6px;text-decoration:none;">
        Review Claim
      </a>
    </p>
    <p style="color:#888;font-size:12px;">Campus Lost & Found Network — SASTRA Deemed University</p>
  </div>
</body>
</html>
