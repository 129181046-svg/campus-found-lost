<!DOCTYPE html>
<html>
<body style="font-family:Arial,sans-serif;max-width:600px;margin:auto;padding:20px;">
  <div style="background:#0F6E56;padding:20px;border-radius:8px 8px 0 0;">
    <h2 style="color:white;margin:0;">✅ Your Claim Was Approved!</h2>
  </div>
  <div style="border:1px solid #ddd;padding:24px;border-radius:0 0 8px 8px;">
    <p>Hi {{ claimer_name }},</p>
    <p>Great news! Your claim on <strong>{{ item_name }}</strong> has been <strong>approved</strong> by {{ finder_name }}.</p>
    <p>Please contact the finder to arrange collection:</p>
    <p style="background:#f0f0f0;padding:12px;border-radius:6px;">
      <strong>Finder:</strong> {{ finder_name }}<br>
      <strong>Email:</strong> {{ finder_email }}
    </p>
    <p style="color:#888;font-size:12px;">Campus Lost & Found Network — SASTRA Deemed University</p>
  </div>
</body>
</html>
