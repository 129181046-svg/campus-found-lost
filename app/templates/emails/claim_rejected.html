<!DOCTYPE html>
<html>
<body style="font-family:Arial,sans-serif;max-width:600px;margin:auto;padding:20px;">
  <div style="background:#c0392b;padding:20px;border-radius:8px 8px 0 0;">
    <h2 style="color:white;margin:0;">❌ Claim Not Approved</h2>
  </div>
  <div style="border:1px solid #ddd;padding:24px;border-radius:0 0 8px 8px;">
    <p>Hi {{ claimer_name }},</p>
    <p>Unfortunately your claim on <strong>{{ item_name }}</strong> was not approved by the finder.</p>
    <p>If you believe this is a mistake, you may contact the finder directly or report the item as lost to increase visibility.</p>
    <p style="color:#888;font-size:12px;">Campus Lost & Found Network — SASTRA Deemed University</p>
  </div>
</body>
</html>
